    // ── BAGUA data (先天八卦序, lines ordered bottom-to-top) ──
    const BAGUA = {
      1: { name: "乾", symbol: "☰", nature: "天", attribute: "刚健", lines: [1, 1, 1] },
      2: { name: "兑", symbol: "☱", nature: "泽", attribute: "喜悦", lines: [1, 1, 0] },
      3: { name: "离", symbol: "☲", nature: "火", attribute: "光明", lines: [1, 0, 1] },
      4: { name: "震", symbol: "☳", nature: "雷", attribute: "震动", lines: [1, 0, 0] },
      5: { name: "巽", symbol: "☴", nature: "风", attribute: "顺入", lines: [0, 1, 1] },
      6: { name: "坎", symbol: "☵", nature: "水", attribute: "陷险", lines: [0, 1, 0] },
      7: { name: "艮", symbol: "☶", nature: "山", attribute: "静止", lines: [0, 0, 1] },
      8: { name: "坤", symbol: "☷", nature: "地", attribute: "柔顺", lines: [0, 0, 0] },
    };

    // ── Reverse mapping: "1,1,1" → bagua number ──
    const LINES_TO_BAGUA = {};
    for (const num in BAGUA) {
      LINES_TO_BAGUA[BAGUA[num].lines.join(",")] = Number(num);
    }

    // ── Method selection ──
    function selectMethod(el) {
      document.querySelectorAll(".method-card").forEach(card => card.classList.remove("active"));
      el.classList.add("active");
      currentMethod = el.dataset.method;
      // Show/hide panels
      document.getElementById("meihuaInput").style.display = currentMethod === "plum" ? "block" : "none";
      var btcPanel = document.getElementById("btcPanel");
      var castSection = document.getElementById("castSection");
      if (currentMethod === "btc") {
        btcPanel.classList.add("visible");
        castSection.style.display = "none";
        startBtcMode();
      } else {
        btcPanel.classList.remove("visible");
        castSection.style.display = "";
        stopBtcMode();
      }
    }

    // ── Coin toss divination ──
    function coinToss() {
      const lines = [];
      for (let i = 0; i < 6; i++) {
        const sum = [0, 1, 2].reduce((acc) => acc + (Math.random() < 0.5 ? 3 : 2), 0);
        if (sum === 6) {
          lines.push({ value: 6, isYang: false, isMoving: true });   // old yin → yang
        } else if (sum === 7) {
          lines.push({ value: 7, isYang: true,  isMoving: false });  // young yang
        } else if (sum === 8) {
          lines.push({ value: 8, isYang: false, isMoving: false });  // young yin
        } else { // 9
          lines.push({ value: 9, isYang: true,  isMoving: true });   // old yang → yin
        }
      }
      return lines;
    }

    // ── Meihua (plum blossom) divination ──
    function meihuaCast() {
      const num1Input = document.getElementById("meihuaNum1").value.trim();
      const num2Input = document.getElementById("meihuaNum2").value.trim();

      let upperNum, lowerNum, movingLine;

      if (num1Input) {
        // 数字起卦
        const n1 = Math.abs(parseInt(num1Input, 10));
        if (isNaN(n1) || n1 < 1) {
          alert("请输入一个正整数。");
          return null;
        }

        if (num2Input) {
          // 双数起卦: 第一个数→上卦, 第二个数→下卦, 两数之和→动爻
          const n2 = Math.abs(parseInt(num2Input, 10));
          if (isNaN(n2) || n2 < 1) {
            alert("第二个数请输入正整数。");
            return null;
          }
          upperNum = n1 % 8;
          if (upperNum === 0) upperNum = 8;
          lowerNum = n2 % 8;
          if (lowerNum === 0) lowerNum = 8;
          movingLine = (n1 + n2) % 6;
          if (movingLine === 0) movingLine = 6;
        } else {
          // 单数起卦: 数字→上卦, 数字+时辰→下卦, 两者之和→动爻
          const hour = new Date().getHours();
          const shiChen = Math.floor((hour + 1) % 24 / 2) + 1;
          upperNum = n1 % 8;
          if (upperNum === 0) upperNum = 8;
          lowerNum = (n1 + shiChen) % 8;
          if (lowerNum === 0) lowerNum = 8;
          movingLine = (n1 + shiChen) % 6;
          if (movingLine === 0) movingLine = 6;
        }
      } else {
        // 时间起卦（无输入时的默认方式）
        const now = new Date();
        const year  = now.getFullYear();
        const month = now.getMonth() + 1;
        const day   = now.getDate();
        const hour  = now.getHours();
        const yearNum = (year - 4) % 12 + 1;
        const shiChen = Math.floor((hour + 1) % 24 / 2) + 1;
        upperNum = (yearNum + month + day) % 8;
        if (upperNum === 0) upperNum = 8;
        lowerNum = (yearNum + month + day + shiChen) % 8;
        if (lowerNum === 0) lowerNum = 8;
        movingLine = (yearNum + month + day + shiChen) % 6;
        if (movingLine === 0) movingLine = 6;
      }

      // Build 6-line array: lower trigram (lines 0-2) + upper trigram (lines 3-5)
      const lowerBagua = BAGUA[lowerNum].lines;
      const upperBagua = BAGUA[upperNum].lines;

      const lines = [];
      for (let i = 0; i < 3; i++) {
        lines.push({ value: lowerBagua[i] ? 7 : 8, isYang: !!lowerBagua[i], isMoving: false });
      }
      for (let i = 0; i < 3; i++) {
        lines.push({ value: upperBagua[i] ? 7 : 8, isYang: !!upperBagua[i], isMoving: false });
      }

      // Mark the moving line (1-indexed, bottom-to-top)
      const ml = lines[movingLine - 1];
      ml.isMoving = true;
      ml.value = ml.isYang ? 9 : 6;

      return lines;
    }

    // ── Helper functions ──

    // Get trigram number from 3 line objects
    function getTrigramNum(threeLines) {
      const key = threeLines.map(l => l.isYang ? 1 : 0).join(",");
      return LINES_TO_BAGUA[key];
    }

    // Return a new 6-line array with moving lines flipped (变卦)
    function getChangedLines(lines) {
      return lines.map(l => {
        if (!l.isMoving) return { ...l };
        return { ...l, isYang: !l.isYang, isMoving: false };
      });
    }

    // 互卦: lines 2-4 as lower, lines 3-5 as upper (0-indexed: indices 1-3 and 2-4)
    function getHuGua(lines) {
      return [
        { ...lines[1] },
        { ...lines[2] },
        { ...lines[3] },
        { ...lines[2] },
        { ...lines[3] },
        { ...lines[4] },
      ];
    }

    // 错卦: invert all isYang values
    function getCuoGua(lines) {
      return lines.map(l => ({ ...l, isYang: !l.isYang, isMoving: false }));
    }

    // 综卦: reverse line order (copy first)
    function getZongGua(lines) {
      return [...lines].reverse().map(l => ({ ...l, isMoving: false }));
    }

    // Build hexagram lookup key from 6 lines: "upper-lower"
    function getHexagramKey(lines) {
      const lower = getTrigramNum(lines.slice(0, 3));
      const upper = getTrigramNum(lines.slice(3, 6));
      return `${upper}-${lower}`;
    }

    // Look up hexagram data (HEXAGRAMS will be added in Tasks 3-4)
    function getHexagramData(lines) {
      if (typeof HEXAGRAMS === "undefined") return null;
      return HEXAGRAMS[getHexagramKey(lines)] || null;
    }

    // ── Yao position names ──
    const YAO_NAMES = ["初", "二", "三", "四", "五", "上"];

    // ── Render yao lines into a container element ──
    function renderYaoLines(container, lines, showLabels = true) {
      container.textContent = "";
      lines.forEach(function(line, idx) {
        var div = document.createElement("div");
        div.className = "yao-line " + (line.isYang ? "yang" : "yin");
        if (line.isMoving) div.className += " moving";

        if (showLabels) {
          var label = document.createElement("span");
          label.className = "yao-label";
          var sym = line.isYang ? "⚊" : "⚋";
          var txt = YAO_NAMES[idx] + sym;
          if (line.isMoving) txt += "◉";
          label.textContent = txt;
          div.appendChild(label);
        }

        if (line.isYang) {
          var bar = document.createElement("div");
          bar.className = "bar";
          div.appendChild(bar);
        } else {
          var bar1 = document.createElement("div");
          bar1.className = "bar";
          var gap = document.createElement("div");
          gap.className = "gap";
          var bar2 = document.createElement("div");
          bar2.className = "bar";
          div.appendChild(bar1);
          div.appendChild(gap);
          div.appendChild(bar2);
        }

        container.appendChild(div);
      });
    }

    // ── Render mini yao lines (for related hexagram diagrams) ──
    function renderMiniYao(container, lines) {
      container.textContent = "";
      lines.forEach(function(line) {
        var div = document.createElement("div");
        div.className = "mini-line " + (line.isYang ? "yang" : "yin");

        if (line.isYang) {
          var bar = document.createElement("div");
          bar.className = "bar";
          div.appendChild(bar);
        } else {
          var bar1 = document.createElement("div");
          bar1.className = "bar";
          var gap = document.createElement("div");
          gap.className = "gap";
          var bar2 = document.createElement("div");
          bar2.className = "bar";
          div.appendChild(bar1);
          div.appendChild(gap);
          div.appendChild(bar2);
        }

        container.appendChild(div);
      });
    }

    // ── Main cast divination function ──
    function castDivination() {
      var lines = currentMethod === "coin" ? coinToss() : meihuaCast();
      if (!lines) return; // meihuaCast returns null on invalid input
      var hasMoving = lines.some(function(l) { return l.isMoving; });
      var hexData = getHexagramData(lines);

      if (!hexData) {
        alert("无法获取卦象数据，请重试。");
        return;
      }

      // Show result section
      document.getElementById("resultSection").classList.add("visible");

      // Set hexagram name (both visible and hidden alias elements)
      document.getElementById("hexagramName").textContent = hexData.name;
      document.getElementById("hexName").textContent = hexData.name;

      // Render yao lines
      renderYaoLines(document.getElementById("yaoLines"), lines);

      // Set 卦辞
      document.getElementById("judgement").textContent = hexData.judgement;
      document.getElementById("judgementExplain").textContent = hexData.judgement_explain;

      // Set 象辞
      document.getElementById("imageText").textContent = hexData.image;

      // Build 爻辞 list
      var lineReadings = document.getElementById("lineReadings");
      lineReadings.textContent = "";
      // Enrich each line with position/text/explain from hexData
      lines.forEach(function(line, idx) {
        var lineInfo = hexData.lines[idx] || {};
        var item = document.createElement("div");
        item.className = "line-reading" + (line.isMoving ? " moving" : "");

        var posDiv = document.createElement("div");
        posDiv.className = "position";
        posDiv.textContent = (lineInfo.position || YAO_NAMES[idx]) + (line.isMoving ? " ◉动爻" : "");

        var textDiv = document.createElement("div");
        textDiv.className = "line-text";
        textDiv.textContent = lineInfo.text || "";

        var explainDiv = document.createElement("div");
        explainDiv.className = "line-explain";
        explainDiv.textContent = lineInfo.explain || "";

        item.appendChild(posDiv);
        item.appendChild(textDiv);
        item.appendChild(explainDiv);
        lineReadings.appendChild(item);
      });

      // Handle 变卦 (changed hexagram)
      var changedSection = document.getElementById("changedSection");
      if (hasMoving) {
        changedSection.style.display = "";
        var changedLines = getChangedLines(lines);
        var changedData = getHexagramData(changedLines);
        if (changedData) {
          document.getElementById("changedName").textContent = changedData.name;
          renderYaoLines(document.getElementById("changedYaoLines"), changedLines, false);
          document.getElementById("changedJudgement").textContent = changedData.judgement;
          document.getElementById("changedJudgementExplain").textContent = changedData.judgement_explain;
        }
      } else {
        changedSection.style.display = "none";
      }

      // Build 卦象关系 (互卦/错卦/综卦)
      var relatedContainer = document.getElementById("relatedHexagrams");
      relatedContainer.textContent = "";
      var relatedDefs = [
        { label: "互卦", computeFn: getHuGua },
        { label: "错卦", computeFn: getCuoGua },
        { label: "综卦", computeFn: getZongGua }
      ];
      relatedDefs.forEach(function(def) {
        var relLines = def.computeFn(lines);
        var relData = getHexagramData(relLines);
        if (!relData) return;

        var wrapper = document.createElement("div");
        wrapper.className = "related-item";

        var labelDiv = document.createElement("div");
        labelDiv.className = "related-label";
        labelDiv.textContent = def.label;

        var miniYaoDiv = document.createElement("div");
        miniYaoDiv.className = "mini-lines";
        renderMiniYao(miniYaoDiv, relLines);

        var nameDiv = document.createElement("div");
        nameDiv.className = "related-name";
        nameDiv.textContent = relData.name;

        var judgementDiv = document.createElement("div");
        judgementDiv.className = "rel-judgement";
        judgementDiv.textContent = relData.judgement;

        wrapper.appendChild(labelDiv);
        wrapper.appendChild(miniYaoDiv);
        wrapper.appendChild(nameDiv);
        wrapper.appendChild(judgementDiv);
        relatedContainer.appendChild(wrapper);
      });

      // Build 象征 trigram symbols
      var symbolRow = document.getElementById("symbolRow");
      symbolRow.textContent = "";
      var upperNum = getTrigramNum(lines.slice(3, 6));
      var lowerNum = getTrigramNum(lines.slice(0, 3));
      [
        { label: "上卦", num: upperNum },
        { label: "下卦", num: lowerNum }
      ].forEach(function(tri) {
        var bagua = BAGUA[tri.num];
        if (!bagua) return;

        var item = document.createElement("div");
        item.className = "symbol-item";

        var symLabel = document.createElement("div");
        symLabel.className = "sym-label";
        symLabel.textContent = tri.label;

        var symValue = document.createElement("div");
        symValue.className = "sym-value";
        symValue.textContent = bagua.symbol + " " + bagua.name;

        var symAttr = document.createElement("div");
        symAttr.className = "sym-attr";
        symAttr.textContent = bagua.nature + " · " + bagua.attribute;

        item.appendChild(symLabel);
        item.appendChild(symValue);
        item.appendChild(symAttr);
        symbolRow.appendChild(item);
      });

      // Set symbolism text
      document.getElementById("symbolism").textContent = hexData.symbolism;

      // Set history
      document.getElementById("history").textContent = hexData.history;

      // Scroll to result
      document.getElementById("resultSection").scrollIntoView({ behavior: "smooth" });
    }

    // ═══════════════════════════════════════
    // BTC 实时卦模式
    // ═══════════════════════════════════════
    var _btcTimer = null;
    var _btcCountdownTimer = null;
    var _btcCurrentOpen = null;
    var _btcCurrentKlineStart = null;
    var _btcLastKlineStart = null;

    function startBtcMode() {
      fetchBtcAndCast();
      // 每10秒检查是否有新K线
      _btcTimer = setInterval(fetchBtcAndCast, 10000);
      // 倒计时每秒更新
      _btcCountdownTimer = setInterval(updateBtcCountdown, 1000);
    }

    function stopBtcMode() {
      if (_btcTimer) { clearInterval(_btcTimer); _btcTimer = null; }
      if (_btcCountdownTimer) { clearInterval(_btcCountdownTimer); _btcCountdownTimer = null; }
    }

    var BTC_PYTH_ID = "0xe62df6c8b4a85fe1a67db44dc12de5db330f7ac66b72dc658afedf0f4a415b43";

    function fetchBtcAndCast() {
      var now = Math.floor(Date.now() / 1000);
      var klineStart = Math.floor(now / 300) * 300; // 当前5分钟周期起点

      // 如果当前周期已有锁定的开盘价，只更新倒计时，不再请求API
      if (klineStart === _btcLastKlineStart && _btcCurrentOpen !== null) {
        return;
      }

      var statusEl = document.getElementById("btcStatus");
      statusEl.className = "btc-status loading";
      statusEl.textContent = "正在获取开盘价...";

      // Pyth REST API: 获取最新价格作为新K线的开盘价
      fetch("https://hermes.pyth.network/v2/updates/price/latest?ids[]=" + BTC_PYTH_ID)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (!data || !data.parsed || !data.parsed[0]) throw new Error("no data");

          var p = data.parsed[0].price;
          var price = parseInt(p.price) * Math.pow(10, parseInt(p.expo));

          // 锁定这个周期的开盘价，直到下一根K线才会更新
          _btcLastKlineStart = klineStart;
          _btcCurrentOpen = price;
          _btcCurrentKlineStart = klineStart * 1000;

          statusEl.className = "btc-status connected";
          statusEl.textContent = "Pyth Network · 开盘价已锁定";

          // 更新价格显示
          document.getElementById("btcPriceText").textContent = "$" + price.toLocaleString("en-US", {minimumFractionDigits: 2, maximumFractionDigits: 2});

          // 更新时间显示
          var klineDate = new Date(klineStart * 1000);
          var timeStr = klineDate.getHours().toString().padStart(2, "0") + ":" + klineDate.getMinutes().toString().padStart(2, "0");
          document.getElementById("btcTimeText").textContent = timeStr + " 开盘";

          btcCast(price, timeStr);
        })
        .catch(function() {
          statusEl.className = "btc-status disconnected";
          statusEl.textContent = "网络错误，10秒后重试";
        });
    }

    function updateBtcCountdown() {
      if (!_btcCurrentKlineStart) return;
      var nextKline = _btcCurrentKlineStart + 5 * 60 * 1000; // 下根K线开始时间
      var now = Date.now();
      var diff = Math.max(0, Math.floor((nextKline - now) / 1000));
      var min = Math.floor(diff / 60);
      var sec = diff % 60;
      document.getElementById("btcCountdown").textContent = "下根K线: " + min + ":" + sec.toString().padStart(2, "0");
    }

    function btcCast(openPrice, timeStr) {
      // 用开盘价的整数部分作为梅花易数的数字
      var priceInt = Math.floor(openPrice);

      // 用价格的前几位和后几位分别作为两个数
      var priceStr = priceInt.toString();
      var n1, n2;
      if (priceStr.length >= 4) {
        // 例如 84523 → n1=845, n2=23
        var mid = Math.ceil(priceStr.length / 2);
        n1 = parseInt(priceStr.substring(0, mid), 10);
        n2 = parseInt(priceStr.substring(mid), 10);
        if (n2 === 0) n2 = 1;
      } else {
        n1 = priceInt;
        n2 = null;
      }

      // 用梅花易数算法起卦
      var upperNum, lowerNum, movingLine;
      if (n2 !== null) {
        upperNum = n1 % 8; if (upperNum === 0) upperNum = 8;
        lowerNum = n2 % 8; if (lowerNum === 0) lowerNum = 8;
        movingLine = (n1 + n2) % 6; if (movingLine === 0) movingLine = 6;
      } else {
        var hour = new Date().getHours();
        var shiChen = Math.floor((hour + 1) % 24 / 2) + 1;
        upperNum = n1 % 8; if (upperNum === 0) upperNum = 8;
        lowerNum = (n1 + shiChen) % 8; if (lowerNum === 0) lowerNum = 8;
        movingLine = (n1 + shiChen) % 6; if (movingLine === 0) movingLine = 6;
      }

      // 构建六爻
      var lowerBagua = BAGUA[lowerNum].lines;
      var upperBagua = BAGUA[upperNum].lines;
      var lines = [];
      for (var i = 0; i < 3; i++) {
        lines.push({ value: lowerBagua[i] ? 7 : 8, isYang: !!lowerBagua[i], isMoving: false });
      }
      for (var i = 0; i < 3; i++) {
        lines.push({ value: upperBagua[i] ? 7 : 8, isYang: !!upperBagua[i], isMoving: false });
      }
      var ml = lines[movingLine - 1];
      ml.isMoving = true;
      ml.value = ml.isYang ? 9 : 6;

      // 渲染结果（复用 castDivination 的渲染逻辑）
      var hexData = getHexagramData(lines);
      if (!hexData) return;

      var hasMoving = lines.some(function(l) { return l.isMoving; });

      document.getElementById("resultSection").classList.add("visible");
      document.getElementById("hexName").textContent = hexData.name;
      var hexagramNameEl = document.getElementById("hexagramName");
      if (hexagramNameEl) hexagramNameEl.textContent = hexData.name;

      renderYaoLines(document.getElementById("yaoLines"), lines);

      document.getElementById("judgement").textContent = hexData.judgement;
      document.getElementById("judgementExplain").textContent = hexData.judgement_explain;

      var imageEl = document.getElementById("imageText");
      if (imageEl) imageEl.textContent = hexData.image;

      // 爻辞
      var lineReadings = document.getElementById("lineReadings");
      lineReadings.textContent = "";
      hexData.lines.forEach(function(line, i) {
        var div = document.createElement("div");
        div.className = "line-reading" + (lines[i].isMoving ? " moving" : "");
        var pos = document.createElement("div");
        pos.className = "position";
        pos.textContent = line.position + (lines[i].isMoving ? " ◉动爻" : "");
        var txt = document.createElement("div");
        txt.className = "line-text";
        txt.textContent = line.text;
        var exp = document.createElement("div");
        exp.className = "line-explain";
        exp.textContent = line.explain;
        div.appendChild(pos);
        div.appendChild(txt);
        div.appendChild(exp);
        lineReadings.appendChild(div);
      });

      // 变卦
      var changedSection = document.getElementById("changedSection");
      if (hasMoving) {
        changedSection.style.display = "";
        var changedLines = getChangedLines(lines);
        var changedData = getHexagramData(changedLines);
        if (changedData) {
          document.getElementById("changedName").textContent = changedData.name;
          renderYaoLines(document.getElementById("changedYaoLines"), changedLines, false);
          document.getElementById("changedJudgement").textContent = changedData.judgement;
          document.getElementById("changedJudgementExplain").textContent = changedData.judgement_explain;
        }
      } else {
        changedSection.style.display = "none";
      }

      // 互卦/错卦/综卦
      var relatedEl = document.getElementById("relatedHexagrams");
      relatedEl.textContent = "";
      [{ label: "互卦", fn: getHuGua }, { label: "错卦", fn: getCuoGua }, { label: "综卦", fn: getZongGua }].forEach(function(rel) {
        var relLines = rel.fn(lines);
        var relData = getHexagramData(relLines);
        var div = document.createElement("div");
        div.className = "related-hex";
        var lbl = document.createElement("div");
        lbl.className = "rel-label";
        lbl.textContent = rel.label;
        div.appendChild(lbl);
        var miniYao = document.createElement("div");
        miniYao.className = "mini-yao";
        renderMiniYao(miniYao, relLines);
        div.appendChild(miniYao);
        var nm = document.createElement("div");
        nm.className = "rel-name";
        nm.textContent = relData ? relData.name : "—";
        div.appendChild(nm);
        relatedEl.appendChild(div);
      });

      // 象征
      var upper = getTrigramNum(lines.slice(3, 6));
      var lower = getTrigramNum(lines.slice(0, 3));
      var symbolRow = document.getElementById("symbolRow");
      symbolRow.textContent = "";
      [{ label: "上卦", num: upper }, { label: "下卦", num: lower }].forEach(function(s) {
        var bagua = BAGUA[s.num];
        var item = document.createElement("div");
        item.className = "symbol-item";
        var sl = document.createElement("div"); sl.className = "sym-label"; sl.textContent = s.label;
        var sv = document.createElement("div"); sv.className = "sym-value"; sv.textContent = bagua.symbol + " " + bagua.name;
        var sa = document.createElement("div"); sa.className = "sym-attr"; sa.textContent = bagua.nature + " · " + bagua.attribute;
        item.appendChild(sl); item.appendChild(sv); item.appendChild(sa);
        symbolRow.appendChild(item);
      });
      document.getElementById("symbolism").textContent = hexData.symbolism;
      document.getElementById("history").textContent = hexData.history;

      document.getElementById("resultSection").scrollIntoView({ behavior: "smooth" });
    }
  </script>
